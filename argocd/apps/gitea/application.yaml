apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
spec:
  project: default

  source:
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/platform/gitops-argocd-gitea.git
    targetRevision: main
    path: gitea/chart

  destination:
    server: https://kubernetes.default.svc
    namespace: gitea

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

  ignoreDifferences:
    # Gitea was helm-installed before ArgoCD adopted it, so its PVC carries
    # Helm ownership metadata and provisioner annotations that don't exist in
    # ArgoCD's rendered target. Bound PVCs are also server-mutated (volumeName,
    # storageClassName). Ignore that noise so the app reports Synced.
    - group: ""
      kind: PersistentVolumeClaim
      jqPathExpressions:
        - .spec.volumeName
        - .spec.storageClassName
        - .spec.volumeMode
        - .status
        - .metadata.annotations
        - .metadata.labels
