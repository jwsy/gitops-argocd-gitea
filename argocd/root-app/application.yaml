apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-apps
  namespace: argocd
spec:
  project: default

  source:
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/platform/gitops-argocd-gitea.git
    targetRevision: main
    path: argocd/apps
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
